<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Teacher Dashboard</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="dashboard">

<img src="{{ url_for('static', filename='images/logo.jpg') }}"
class="page-logo">

<h1>Teacher Dashboard</h1>

<h2>Welcome, {{ session['name'] }}</h2>

<p class="dashboard-subtitle">

Welcome to the teacher portal.

</p>

<div class="dashboard-grid">

<div class="dashboard-card">

<h3>👨‍🎓</h3>

<h2>Students</h2>

<p>View student information.</p>

<a href="{{ url_for('students') }}">View Students</a>

</div>

<div class="dashboard-card">

<h3>📢</h3>

<h2>Announcements</h2>

<p>Read institute announcements.</p>

<a href="{{ url_for('announcements_page') }}">Open</a>

</div>

<div class="dashboard-card">

<h3>📅</h3>

<h2>Events</h2>

<p>View upcoming institute events.</p>

<a href="{{ url_for('events_page') }}">Open</a>

</div>

<div class="dashboard-card">

<h3>📝</h3>

<h2>Marks</h2>

<p>Enter student marks.</p>

<a href="{{ url_for('marks') }}">Open</a>

</div>

</div>

<a class="logout-btn"
href="{{ url_for('logout') }}">

Logout

</a>

</div>

</body>

</html>
