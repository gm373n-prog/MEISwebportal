<!DOCTYPE html>
<html>
<head>
    <title>Add Event</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h1>📅 Add Event</h1>

<form method="POST">

    <input type="text"
           name="title"
           placeholder="Event Title"
           required>

    <input
        type="text"
        name="date"
        placeholder="DD/MM/YYYY"
        required>
    <textarea
        name="description"
        placeholder="Event Description"
        required></textarea>

    <button type="submit">
        Save Event
    </button>

</form>

</body>
</html>
