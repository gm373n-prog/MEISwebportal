<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>All Student Results</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="dashboard">

<img src="{{ url_for('static', filename='images/logo.jpg') }}"
class="page-logo">

<h1>📊 Student Results</h1>

<p class="dashboard-subtitle">

Muhammadan Educational Institute of Science

</p>

<table border="1" cellpadding="10" cellspacing="0" width="100%">

<tr>

<th>Student</th>

{% for subject in subjects %}

<th>{{ subject }}</th>

{% endfor %}

</tr>

{% for student in students %}

<tr>

<td>{{ student.name }}</td>

{% for subject in subjects %}

<td>

{{ student.marks.get(subject, "-") }}

</td>

{% endfor %}

</tr>

{% endfor %}

</table>

<br>

<a href="{{ url_for('principal_dashboard') }}"
class="logout-btn">

← Back

</a>

</div>

</body>

</html>
