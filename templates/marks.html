<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Marks Entry</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="dashboard">

    <h1>📝 Marks Entry</h1>

    <h2>Welcome {{ session['name'] }}</h2>

    <p class="dashboard-subtitle">
        Enter marks for your subjects.
    </p>

    <form method="POST">

        <label><b>Select Class</b></label>

        <select name="selected_class" required>

            <option value="">Select Class</option>

            <option value="7th"
            {% if selected_class=="7th" %}selected{% endif %}>7th</option>

            <option value="9th"
            {% if selected_class=="9th" %}selected{% endif %}>9th</option>

            <option value="10th"
            {% if selected_class=="10th" %}selected{% endif %}>10th</option>

            <option value="1st year"
            {% if selected_class=="1st year" %}selected{% endif %}>1st Year</option>

            <option value="2nd year"
            {% if selected_class=="2nd year" %}selected{% endif %}>2nd Year</option>

        </select>

        <br><br>

        <label><b>Select Group</b></label>

        <select name="selected_group">

            <option value="General"
            {% if selected_group=="General" %}selected{% endif %}>General</option>

            <option value="Computer"
            {% if selected_group=="Computer" %}selected{% endif %}>Computer</option>

            <option value="Biology"
            {% if selected_group=="Biology" %}selected{% endif %}>Biology</option>

            <option value="Statistics"
            {% if selected_group=="Statistics" %}selected{% endif %}>Statistics</option>

        </select>

        <br><br>

        <button type="submit"
                name="action"
                value="load"
                class="logout-btn">

            🔍 Load Students

        </button>

        <br><br>

        {% if students %}

        <label><b>Select Test</b></label>

        <select name="test">

            {% for i in range(1,101) %}

            <option value="Test {{ i }}">
                Test {{ i }}
            </option>

            {% endfor %}

        </select>

        <br><br>

        <table border="1" cellpadding="10" cellspacing="0" width="100%">

            <tr>

                <th>Student</th>

                {% for subject in subjects %}

                <th>{{ subject }}</th>

                {% endfor %}

            </tr>

            {% for student in students %}

            <tr>

                <td>{{ student.name }}</td>

                {% for subject in subjects %}

                <td>

                    <select name="{{ student.username }}_{{ subject }}_status">

                        <option value="Present">Present</option>

                        <option value="Absent">Absent</option>

                    </select>

                    <br><br>

                    <input
                        type="number"
                        name="{{ student.username }}_{{ subject }}_obtained"
                        placeholder="Obt."
                        min="0"
                        style="width:55px;">

                    /

                    <input
                        type="number"
                        name="{{ student.username }}_{{ subject }}_total"
                        placeholder="Total"
                        min="1"
                        style="width:55px;">

                </td>

                {% endfor %}

            </tr>

            {% endfor %}

        </table>

        <br>

        <button type="submit"
                name="action"
                value="save"
                class="logout-btn">

            💾 Save Marks

        </button>

        {% endif %}

    </form>

    <br>

    <a href="{{ url_for('principal_dashboard') }}"
       class="logout-btn">

        ← Back

    </a>

</div>

</body>

</html>
