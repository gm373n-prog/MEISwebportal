<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Marks Entry</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="dashboard">

<h1>📝 Marks Entry</h1>

<h2>Welcome {{ session['name'] }}</h2>

<p class="dashboard-subtitle">

Enter marks for your subjects.

</p>

<form method="POST">

<table border="1" cellpadding="10" cellspacing="0" width="100%">

<tr>

<th>Student</th>

{% for subject in subjects %}
<th>{{ subject }}</th>
{% endfor %}

</tr>

{% for student in students %}

<tr>

<td>{{ student.name }}</td>

{% for subject in subjects %}

<td>

<input
type="number"
name="{{ student.username }}_{{ subject }}"
min="0"
max="100"
value="0"
style="width:70px;">

</td>

{% endfor %}

</tr>

{% endfor %}

</table>

<br>

<button type="submit" class="logout-btn">

💾 Save Marks

</button>

</form>

<br>

<a href="{{ url_for('teacher_dashboard') }}"
class="logout-btn">

← Back

</a>

</div>

</body>

</html>
